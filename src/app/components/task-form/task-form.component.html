<ion-card class="form-card animate-fade-in-up">
  <ion-card-content>
    <form [formGroup]="taskForm" (ngSubmit)="submitForm()">

      <!-- Título de la tarea -->
      <ion-input
        class="form-input"
        mode="md"
        fill="outline"
        formControlName="title"
        placeholder="¿Qué necesitas hacer?"
        [clearInput]="true"
        type="text"
        label="Tarea"
        labelPlacement="floating"
      ></ion-input>

      <!-- Selector de categoría (controlado por feature flag) -->
      @if (showCategories() && categories().length > 0) {
        <ion-select
          class="form-input category-select"
          mode="md"
          fill="outline"
          formControlName="categoryId"
          placeholder="Sin categoría"
          label="Categoría"
          labelPlacement="floating"
          interface="popover"
        >
          <ion-select-option value="">Sin categoría</ion-select-option>
          @for (cat of categories(); track cat.id) {
            <ion-select-option [value]="cat.id">
              {{ cat.name }}
            </ion-select-option>
          }
        </ion-select>
      }

      <!-- Botones de acción -->
      <div class="form-actions">
        <ion-button
          class="submit-btn"
          expand="block"
          type="submit"
          [disabled]="taskForm.invalid"
          aria-label="Guardar tarea"
        >
          <ion-icon [name]="editMode() ? 'checkmark-outline' : 'add-outline'" slot="start"></ion-icon>
          {{ editMode() ? 'Actualizar' : 'Agregar' }} Tarea
        </ion-button>

        @if (editMode()) {
          <ion-button
            class="cancel-btn"
            expand="block"
            fill="outline"
            color="medium"
            (click)="cancelEdit()"
            aria-label="Cancelar edición"
            (keydown.enter)="cancelEdit()"
            (keydown.space)="cancelEdit()"
          >
            <ion-icon name="close-outline" slot="start"></ion-icon>
            Cancelar
          </ion-button>
        }
      </div>
    </form>
  </ion-card-content>
</ion-card>
