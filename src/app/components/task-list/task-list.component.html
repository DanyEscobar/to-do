<ion-list class="task-list stagger-list" lines="none">
  @for (task of filteredTasks(); track task.id) {
    <ion-item-sliding>
      <ion-item
        class="task-item"
        [class.task-completed]="task.completed"
      >
        <!-- Checkbox -->
        <ion-checkbox
          slot="start"
          [checked]="task.completed"
          (ionChange)="toggleComplete(task)"
          aria-label="Marcar tarea como completada"
          class="task-checkbox"
        ></ion-checkbox>

        <!-- Contenido de la tarea -->
        <ion-label class="task-content">
          <h2 class="task-title" [class.completed-text]="task.completed">
            {{ task.title }}
          </h2>
          @if (showCategories() && task.categoryId) {
            <ion-chip class="category-chip" [style.--background]="categoryService.getCategoryColor(task.categoryId) + '18'" [style.--color]="categoryService.getCategoryColor(task.categoryId)">
              <span class="category-dot" [style.background-color]="categoryService.getCategoryColor(task.categoryId)"></span>
              {{ categoryService.getCategoryName(task.categoryId) }}
            </ion-chip>
          }
        </ion-label>

        <!-- Botones de acción -->
        <ion-buttons slot="end" class="action-buttons">
          <ion-button
            fill="clear"
            shape="round"
            (click)="onEdit(task)"
            aria-label="Editar tarea"
            title="Editar tarea"
            class="edit-btn"
            (keydown.enter)="onEdit(task)"
            (keydown.space)="onEdit(task)"
          >
            <ion-icon name="create-outline" slot="icon-only"></ion-icon>
          </ion-button>
          <ion-button
            fill="clear"
            color="danger"
            shape="round"
            (click)="openDeleteModal(task.id)"
            aria-label="Eliminar tarea"
            title="Eliminar tarea"
            class="delete-btn"
            (keydown.enter)="openDeleteModal(task.id)"
            (keydown.space)="openDeleteModal(task.id)"
          >
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-item>

      <!-- Slide options para swipe -->
      <ion-item-options side="end">
        <ion-item-option 
          color="primary" 
          (click)="onEdit(task)" 
          (keydown.enter)="onEdit(task)" 
          (keydown.space)="onEdit(task)"
        >
          <ion-icon name="create-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option 
          color="danger" 
          (click)="openDeleteModal(task.id)" 
          (keydown.enter)="openDeleteModal(task.id)" 
          (keydown.space)="openDeleteModal(task.id)"
        >
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  } @empty {
    <div class="empty-state">
      <ion-icon name="checkmark-done-outline"></ion-icon>
      <h3>¡Todo listo!</h3>
      <p>No tienes tareas pendientes en esta vista.</p>
    </div>
  }
</ion-list>

<!-- Modal de confirmación de eliminación -->
<app-delete-modal
  [open]="modalOpen()"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()"
></app-delete-modal>
